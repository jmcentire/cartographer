framework: cjis
framework_version: "FBI CJIS Security Policy"
controls:
  - id: CJIS-5-5-ACCESS-CONTROL
    family: Access Control
    framework_ref: Policy Area 5.5
    title: Application routes show access-control guard evidence
    severity: must
    detection: {method: route_guard, guard_patterns: ["Depends", "require_auth", "require_role", "authorize"]}
    validation_test: {style: static_assertion, assertion: every_route_has_guard, params: {guard_patterns: ["Depends", "require_auth", "require_role", "authorize"]}}
  - id: CJIS-5-6-IDENTIFICATION-AUTHENTICATION
    family: Identification and Authentication
    framework_ref: Policy Area 5.6
    title: Authentication implementation is represented
    severity: must
    detection: {method: source_grep, any_of: ["MFA", "multi[-_ ]?factor", "webauthn", "totp"], include_glob: "**/*"}
    validation_test: {style: static_assertion, assertion: source_pattern_present, params: {pattern: "MFA|multi[-_ ]?factor|webauthn|totp", include_glob: "**/*"}}
  - id: CJIS-5-10-ENCRYPTION
    family: System and Communications Protection
    framework_ref: Policy Area 5.10
    title: Sensitive Ledger fields are encrypted at rest
    severity: must
    classification_tier: COMPLIANCE
    applicability: {requires_ledger_registry: true}
    detection: {method: ledger_tier_encrypted, tier: COMPLIANCE}
    validation_test: {style: static_assertion, assertion: ledger_tier_all_encrypted, params: {tier: COMPLIANCE}}
  - id: CJIS-5-4-AUDIT
    family: Audit and Accountability
    framework_ref: Policy Area 5.4
    title: Audit logging is represented
    severity: must
    detection: {method: source_grep, any_of: ["audit"], include_glob: "**/*"}
    validation_test: {style: static_assertion, assertion: source_pattern_present, params: {pattern: "audit", include_glob: "**/*"}}
  - id: CJIS-5-12-PERSONNEL
    family: Personnel Security
    framework_ref: Policy Area 5.12
    title: Personnel security evidence exists
    severity: must
    detection: {method: evidence_doc, evidence_path_key: personnel_security, max_age_days: 365}
    evidence_owner: Security Officer
  - id: CJIS-5-9-PHYSICAL
    family: Physical Protection
    framework_ref: Policy Area 5.9
    title: Physical protection evidence exists
    severity: must
    detection: {method: evidence_doc, evidence_path_key: physical_security, max_age_days: 365}
    evidence_owner: Security Officer
